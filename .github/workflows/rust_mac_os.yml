name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on v0.1.0, v1.2.3, etc.

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Build Intel Binary
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build Apple Silicon Binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/universal-macos
          lipo -create \
            target/x86_64-apple-darwin/release/gitlink \
            target/aarch64-apple-darwin/release/gitlink \
            -output target/universal-macos/gitlink
          
          # Package it as a .tar.gz (required for Homebrew)
          cd target/universal-macos
          tar -czf gitlink-macos-universal.tar.gz gitlink

      - name: Generate SHA256
        run: shasum -a 256 target/universal-macos/gitlink-macos-universal.tar.gz > target/universal-macos/gitlink-macos-universal.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/universal-macos/gitlink-macos-universal.tar.gz
            target/universal-macos/gitlink-macos-universal.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
