name: Release macOS Binary

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  OPENSSL_STATIC: 1
  OPENSSL_NO_VENDOR: 0

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install OpenSSL via Homebrew
        run: brew install openssl@3

      - name: Build x86_64
        run: |
          OPENSSL_DIR=$(brew --prefix openssl@3) \
          OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include \
          OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib \
          X86_64_APPLE_DARWIN_OPENSSL_DIR=$(brew --prefix openssl@3) \
          X86_64_APPLE_DARWIN_OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include \
          X86_64_APPLE_DARWIN_OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib \
          PKG_CONFIG_ALLOW_CROSS=1 \
          cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: |
          OPENSSL_DIR=$(brew --prefix openssl@3) \
          OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include \
          OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib \
          cargo build --release --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/gitlink \
            target/aarch64-apple-darwin/release/gitlink \
            -output target/release/gitlink-macos-universal

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/gitlink-macos-universal
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}