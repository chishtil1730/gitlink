name: Release macOS Binary

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v0.1.0

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          # If your app needs this during compilation/testing
          GITLINK_CLIENT_ID: ${{ secrets.GITLINK_CLIENT_ID }}

      - name: Package Binary
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../gitlink-${{ matrix.target }}.tar.gz gitlink

      - name: Calculate Hash
        run: shasum -a 256 gitlink-${{ matrix.target }}.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: gitlink-*.tar.gz